<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Tente clicar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="style.css" />
  </head>
  <body>
    <div class="levels">
      <p>Current Level: <span id="current_level">1</span></p>
      <p>Next Level: ( height = <span id="next_level">34</span>)</p>
    </div>
    <br /><br /><br />
    <div class="points">
      <p id="width_point">width:</p>
      <ps id="height_point">height:</ps>
    </div>

    <button
      class="button"
      id="button"
      onmouseover="hoverButton('button')"
      onclick="clique('button')"
    >
      Clique em mim
      <span id="timerBtn"></span>
    </button>

    <div class="cross left" id="left_cross"></div>
    <div class="cross top" id="top_cross"></div>
    <div class="cross right" id="right_cross"></div>
    <div class="cross bottom" id="bottom_cross"></div>

    <script src="script.js"></script>
  </body>
</html>
